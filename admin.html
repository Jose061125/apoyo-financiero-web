<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="description" content="Panel de administración de Apoyo Financiero. Acceso restringido.">
  <meta name="keywords" content="admin, panel, apoyo financiero">
  <meta name="author" content="Apoyo Financiero">
  <meta property="og:title" content="Administración - Apoyo Financiero">
  <meta property="og:description" content="Panel seguro para gestionar registros y estadísticas.">
  <meta property="og:image" content="https://Jose061125.github.io/apoyo-financiero-web/icon-512.png">
  <meta property="og:url" content="https://Jose061125.github.io/apoyo-financiero-web/admin.html">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <div class="container nav-container">
        <a href="index.html" class="logo">Apoyo Financiero</a>
        <ul class="nav-list">
          <li><a href="index.html">Volver al sitio</a></li>
          <li><button id="theme-toggle" class="theme-btn" aria-label="Cambiar tema">🌙</button></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container">
    <section id="auth" class="form-section">
      <h2>Panel de acceso</h2>
      <p>Login para administrador.</p>
      <form id="login-form">
        <label for="login-user">Usuario</label>
        <input type="text" id="login-user" required />
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" required />
        <button type="submit" class="btn btn-primary">Iniciar sesión como Admin</button>
      </form>
      <p id="login-msg" class="resultado"></p>
    </section>

    <section id="adminPanel" class="form-section hidden">
      <h2>Panel de Administración</h2>
      <p>Estadísticas y control de la plataforma.</p>
      <div class="admin-stats-grid" id="admin-stats"></div>
      <div class="bar-chart">
        <div class="bar" title="Usuarios"></div>
        <div class="bar" title="Referidos"></div>
        <div class="bar" title="Productos"></div>
      </div>
      <button id="logout-btn" class="btn btn-secondary">Cerrar sesión</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html></content>
